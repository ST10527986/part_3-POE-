<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="CSS/style.css">
    <script src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
<h1>Contact us</h1> <!-- This is the header with nav -->
<div class="logo-container">
<img src="Images/safelogo.png"
     class="logo">
<nav>
    <ul>
        <li><a href="index1.html">Home</a></li>
        <li><a href="aboutus.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">contact</a></li>
        <li><a href="volunteer.html">Volunteer</a></li>
    </ul>
</nav>
</header>
<main>
    <div class="contact-banner">

    <img src="images/contact-banner.png" alt="Animal shelter contact team">

</div>
    <div class="form-container">


<form> <!-- This is the form to contact us-->

<label for="name">First Name:</label><br>
<input type="text" id="fname" name="fname" placeholder="first name" required><br>

<label for="name">last Name:</label><br>
<input type="text" id="lname" name="lname" placeholder="Last name" required><br>

<label for="email">Email:</label><br>
<input type="email" id="email" name="email" placeholder="you@example.com" required><br><br>

<label for="phone">Phone Number:</label><br>
<input type="tel" id="phone" name="phone" placeholder="+27"><br><br>

<label for="inquiry">Inquiry Type:</label><br>
<select id="inquiry" name="inquiry" required>
  <option value="">--Please choose an option--</option>
  <option value="adoption">Adoption</option>
  <option value="volunteer">Volunteer</option>
  <option value="Foster program">Foster program</option>
  <option value="donation">Donation</option>
  <option value="general">General Question</option>
</select><br><br>

<label for="message">Your Message:</label><br>
<textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here..." required></textarea><br><br>

<input type="submit" value="Send Message">

<footer>
    <p> &copy; 2026 Tour Safe Haven ZA. All rights reserved</p>
</footer> <!-- This is the footer -->

</form>
</div>
</main>
</body>
</html>
