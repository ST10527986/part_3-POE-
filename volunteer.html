<body>

<header>  <!-- This is the header with navigation -->
<h1>Volunteer Form</h1>
<div class="logo-container">
<img src="Images/safelogo.png"
     class="logo">


</div>
<nav>
    <ul>
        <li><a href="index1.html">Home</a></li>

    </ul>

</header>
<main>
<!-- This is the form -->
<div class="volunteer-image">
        <img src="images/volunteer.webp" alt="Volunteers caring for animals">
    </div>
<div class="form-container">
<form>

<label for="fname">First name:</label><br>
<input type="text" id="fname" name="fname" placeholder="first name.." required><br><br>

<label for="lname">Surname:</label><br>
<input type="text" id="lname" name="lname" placeholder="last name.." required><br><br>

<label for="Email">Email:</label><br>
<input type="email" id="Email" name="Email" placeholder="you@example.com" required><br><br>

<label for="age">Enter your age(no minors):</label><br>
<input type="number" id="age" name="age" min="18" placeholder="18 or older" required><br><br>

<label>Gender:</label><br>

  <input type="radio" id="male" name="gender" value="male" required>
  <label for="male">Male</label><br>

  <input type="radio" id="female" name="gender" value="female">
  <label for="female">Female</label><br>

  <input type="radio" id="other" name="gender" value="other">
  <label for="other">Other</label><br><br>

  <label for="message">Short motivation essay:</label><br>
  <textarea id="message" name="message" rows="5" cols="40" placeholder="Type your message here..."></textarea><br>

  <input type="submit" value="Submit">
  <input type="reset" value="reset">

</form>
</div>
</main>
<!-- This is the footer -->
